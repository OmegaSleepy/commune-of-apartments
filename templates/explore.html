<!DOCTYPE html>
<html>
<head>
    <title>Explore</title>
    <link rel="stylesheet" href="{{ base }}static/style.css">
</head>
<body>

<h1>Explore Listings</h1>

<input type="text" id="search" placeholder="Filter by tag...">

<div class="grid" id="grid">
    {% for listing in listings %}
    <div class="card" data-tags="{{ listing.tags | join(',') }}">
        <div class="image-wrapper">
            <img src="{{ listing.image }}">
        </div>
        <h2>{{ listing.title }}</h2>
        <p>{{ listing.price }}</p>
    </div>
    {% endfor %}
</div>

<script>
document.getElementById("search").addEventListener("input", function() {
    let value = this.value.toLowerCase();

    document.querySelectorAll(".card").forEach(card => {
        let tags = card.dataset.tags.toLowerCase();

        card.style.display = tags.includes(value) ? "block" : "none";
    });
});
</script>

</footer>

</body>
</html>
