<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ meta.title }}</title>
    <link rel="stylesheet" href="{{ base }}static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>{{ meta.title }}</h1>
            <p class="price"> {{ meta.price }}</p>
        </header>

        <div class="image-wrapper">
            <img src="{{ meta.image }}" alt="Основна снимка">
        </div>

        <div class="tags">
            {% for tag in meta.tags %}
                <span class="tag">{{ tag }}</span>
            {% endfor %}
        </div>

        <article class="content">
            {{ content | safe }}
        </article>
    </div>

    <footer class="footer">
        <div class="footer-content">
            <p>📩 Контакт: <a href="mailto:m.v.georgiev2307@gmail.com">m.v.georgiev2307@gmail.com</a></p>
            <p>💬 Discord: "If you know it, find me there"</p>
        </div>
    </footer>
</body>
</html>
