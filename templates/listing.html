<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ meta.title }}</title>
    <link rel="stylesheet" href="{{ base }}static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <nav class="top-nav">
        <a href="{{ base }}index.html" class="back-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Назад към имотите
        </a>
    </nav>

    <header>
        <h1>{{ meta.title }}</h1>
        <p class="price">💎 {{ meta.price }}</p>
    </header>

    <div class="gallery-wrapper">
        <div class="slider" id="main-slider">
            <div class="slide"><img src="{{ meta.image }}" alt="Main view"></div>

            {% for img_url in meta.gallery %}
                <div class="slide"><img src="{{ img_url }}" alt="Gallery image"></div>
            {% endfor %}
        </div>

        <button class="slider-nav prev" onclick="moveSlider(-1)">&#10094;</button>
        <button class="slider-nav next" onclick="moveSlider(1)">&#10095;</button>

        <div class="slider-counter"><span id="current-idx">1</span> / {{ (meta.gallery | length) + 1 }}</div>
    </div>

    <div class="tags">
        {% for tag in meta.tags %}
            <span class="tag">{{ tag }}</span>
        {% endfor %}
    </div>

    <article class="content">
        {{ content | safe }}
    </article>
</div>

<script>
    const slider = document.getElementById('main-slider');
    const counter = document.getElementById('current-idx');

    function moveSlider(direction) {
        const slideWidth = slider.querySelector('.slide').clientWidth;
        slider.scrollBy({ left: direction * slideWidth, behavior: 'smooth' });

        // Update counter after a small delay for the scroll to finish
        setTimeout(() => {
            const current = Math.round(slider.scrollLeft / slideWidth) + 1;
            counter.innerText = current;
        }, 300);
    }
</script>

    <footer class="footer">
        <div class="footer-content">
            <p>📩 Контакт: <a href="mailto:m.v.georgiev2307@gmail.com">m.v.georgiev2307@gmail.com</a></p>
            <p>💬 Discord: "If you know it, find me there"</p>
        </div>
    </footer>
</body>
</html>
